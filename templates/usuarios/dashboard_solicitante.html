<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Solicitante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand fw-bold">Sistema de Reportes — Unimagdalena</span>
    <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Cerrar sesión</a>
</nav>
<div class="container mt-4">
    <h5>Bienvenido, {{ request.user.username }}</h5>
    <p class="text-muted">Rol: Solicitante</p>
    <hr>
    <div class="row g-3">
        <div class="col-md-4">
            <div class="card border-primary">
                <div class="card-body text-center">
                    <h6 class="card-title">Mis Reportes</h6>
                    <p class="text-muted small">Ver y hacer seguimiento de tus reportes</p>
                    <a href="{% url 'mis_reportes' %}" class="btn btn-primary btn-sm">Ver reportes</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-success">
                <div class="card-body text-center">
                    <h6 class="card-title">Nuevo Reporte</h6>
                    <p class="text-muted small">Reportar un daño en la infraestructura</p>
                    <a href="{% url 'crear_reporte' %}" class="btn btn-success btn-sm">Crear reporte</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
